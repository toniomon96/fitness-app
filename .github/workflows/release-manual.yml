name: Release Verification Matrix

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      target:
        description: Release target to validate
        required: true
        default: preview
        type: choice
        options:
          - preview
          - production
      base_url:
        description: Optional explicit base URL override for the environment under test
        required: false
        type: string

concurrency:
  group: release-verification-${{ github.ref }}-${{ inputs.target }}
  cancel-in-progress: true

jobs:
  verify-release:
    name: Manual Release Verification (${{ inputs.target }})
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Resolve verification command
        id: verify-command
        shell: bash
        run: |
          if [[ "${{ inputs.target }}" == "production" ]]; then
            echo "script=verify:prod" >> "$GITHUB_OUTPUT"
          else
            echo "script=verify:preview" >> "$GITHUB_OUTPUT"
          fi

      - name: Run release verification gate
        run: npm run ${{ steps.verify-command.outputs.script }}
        env:
          E2E_BASE_URL: ${{ inputs.base_url || secrets.E2E_BASE_URL }}
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}

      - name: Publish release matrix summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Release verification summary"
            echo ""
            echo "- Target: ${{ inputs.target }}"
            echo "- Command: npm run ${{ steps.verify-command.outputs.script }}"
            echo "- Base URL override supplied: ${{ inputs.base_url != '' }}"
            echo "- Golden-path policy reference: docs/E2E_TEST_MATRIX.md"
            echo "- Manual QA references: docs/RELEASE_CHECKLIST.md and docs/RELEASE_DAY.md"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Publish release verification summary
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: 'test-results/junit.xml'
          check_name: 'Manual Release Verification Results (${{ inputs.target }})'
          fail_on_failure: true

      - name: Upload release report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-verification-report-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/
          retention-days: 14