name: Promote dev to main

on:
  workflow_dispatch:
    inputs:
      title:
        description: Optional release PR title override
        required: false
        type: string
      notes:
        description: Optional release notes or QA notes to include in the PR body
        required: false
        type: string

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: promote-dev-to-main
  cancel-in-progress: false

jobs:
  promote:
    name: Open release PR
    runs-on: ubuntu-latest

    steps:
      - name: Ensure workflow runs from dev
        shell: bash
        run: |
          if [[ "${GITHUB_REF_NAME}" != "dev" ]]; then
            echo "This workflow must be run from the dev branch."
            exit 1
          fi

      - name: Create or update dev to main PR
        id: promote
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const titleInput = core.getInput('title').trim();
            const notesInput = core.getInput('notes').trim();
            const today = new Date().toISOString().slice(0, 10);
            const title = titleInput || `release: promote dev to main (${today})`;
            const notesSection = notesInput
              ? `## Release Notes\n\n${notesInput}\n\n`
              : '';
            const body = `${notesSection}## Promotion Checklist\n\n- [ ] Verify DEV is green in GitHub Actions\n- [ ] Review the Vercel Preview deployment\n- [ ] Confirm Preview Release Gate passes\n- [ ] Complete manual QA on Preview\n- [ ] Merge to main when approved\n\nThis PR was created by the \`Promote dev to main\` workflow.`;

            const { data: pulls } = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              base: 'main',
              head: `${owner}:dev`,
              per_page: 1,
            });

            let pull;
            let action;

            if (pulls.length > 0) {
              pull = (await github.rest.pulls.update({
                owner,
                repo,
                pull_number: pulls[0].number,
                title,
                body,
              })).data;
              action = 'updated';
            } else {
              pull = (await github.rest.pulls.create({
                owner,
                repo,
                head: 'dev',
                base: 'main',
                title,
                body,
              })).data;
              action = 'created';
            }

            core.setOutput('action', action);
            core.setOutput('pr_number', String(pull.number));
            core.setOutput('pr_url', pull.html_url);

            await core.summary
              .addHeading('Release PR ready')
              .addRaw(`Action: ${action}\n\n`)
              .addLink(`PR #${pull.number}`, pull.html_url)
              .addRaw('\n')
              .write();

      - name: Log PR URL
        shell: bash
        run: echo "${{ steps.promote.outputs.action }} PR ${{ steps.promote.outputs.pr_url }}"