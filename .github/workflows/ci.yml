name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  branch-name:
    name: Branch Name Gate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Validate PR branch name
        shell: bash
        run: |
          HEAD_REF="${{ github.head_ref }}"
          BASE_REF="${{ github.base_ref }}"

          if [[ "$BASE_REF" == "dev" ]]; then
            if [[ ! "$HEAD_REF" =~ ^(feature|bug|fix|chore|docs|polish)/.+$ ]]; then
              echo "PRs into dev must come from feature/*, bug/*, fix/*, chore/*, docs/*, or polish/* branches."
              exit 1
            fi
          fi

          if [[ "$BASE_REF" == "main" ]]; then
            if [[ ! "$HEAD_REF" =~ ^(dev|hotfix/.+)$ ]]; then
              echo "PRs into main must come from dev or hotfix/* branches."
              exit 1
            fi
          fi

  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: branch-name
    if: always() && (needs.branch-name.result == 'success' || needs.branch-name.result == 'skipped')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Local verification gate
        run: npm run verify:local

  e2e-smoke-pr:
    name: Dev PR Smoke Check
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'pull_request' && github.base_ref == 'dev'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run smoke pre-merge checks
        run: npm run verify:smoke
        env:
          E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}

      - name: Publish smoke test summary
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: 'test-results/junit.xml'
          check_name: 'Dev PR Smoke Results'
          fail_on_failure: true

      - name: Upload smoke report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-report-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/
          retention-days: 14

  e2e-dev:
    name: Dev Verification Gate
    runs-on: ubuntu-latest
    needs: quality
    if: |
      github.ref_name == 'dev' ||
      (github.event_name == 'pull_request' && github.base_ref == 'dev')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run full dev verification suite
        run: npm run verify:dev
        env:
          E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}

      # Publish test results as a native GitHub Actions check — visible directly
      # on the PR/commit page without needing to download anything.
      # Runs whether tests passed or failed so you always get a summary.
      - name: Publish test summary
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: 'test-results/junit.xml'
          check_name: 'Dev Verification Results'
          fail_on_failure: true

      - name: Upload full report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-dev-full-report-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/
          retention-days: 14

  e2e-prod:
    name: Production Verification Gate
    runs-on: ubuntu-latest
    needs: quality
    if: |
      github.ref_name == 'main' ||
      (github.event_name == 'pull_request' && github.base_ref == 'main')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Verify E2E credentials are set
        run: |
          if [ -z "$E2E_TEST_EMAIL" ]; then
            echo "::warning::E2E_TEST_EMAIL is NOT set — auth tests will skip"
          else
            echo "E2E_TEST_EMAIL is set (${#E2E_TEST_EMAIL} chars)"
          fi
          if [ -z "$E2E_TEST_PASSWORD" ]; then
            echo "::warning::E2E_TEST_PASSWORD is NOT set — auth tests will skip"
          else
            echo "E2E_TEST_PASSWORD is set"
          fi
        env:
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}

      - name: Run full production verification suite
        run: npm run verify:prod
        env:
          E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}

      - name: Publish test summary
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: 'test-results/junit.xml'
          check_name: 'Production Verification Results'
          fail_on_failure: true

      - name: Upload full report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-preview-report-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/
          retention-days: 14
